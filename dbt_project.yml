name: 'zamara_finance'
version: '0.1.0'
config-version: 2

profile: 'zamara_finance'

# Project paths
model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

# Variables — adjust at the project level (override per target if needed)
vars:
  # Bronze seeds now hold monthly G/L movements for 2026-01 .. 2026-05.
  # reporting_period selects the trial-balance closing position "as at" that
  # month end (cumulative). Override at run time, e.g.
  #   dbt build --vars 'reporting_period: 2026-03'
  reporting_period: '2026-05'
  group_currency:   'KES'

# Model configurations
models:
  zamara_finance:
    +materialized: view
    +persist_docs:
      relation: false
      columns: false

    staging:
      +materialized: view
      +schema: staging
      per_subsidiary:
        +schema: staging
        +tags: ['per_subsidiary']

    intermediate:
      +materialized: view
      +schema: intermediate

    marts:
      +materialized: table
      core:
        +schema: core
      subsidiary:
        +schema: subsidiary
      consolidation:
        +schema: consolidation

# Seed configurations
seeds:
  zamara_finance:
    +quote_columns: true        # preserve PascalCase column names exactly
    bronze:
      +schema: bronze_source
    reference:
      +schema: ref

# Snapshot configurations
snapshots:
  zamara_finance:
    +target_schema: snapshots
    +strategy: timestamp

# Tests — apply default severity
tests:
  +severity: warn
